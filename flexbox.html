<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container{
            border: 2px solid red;
            display: flex;
            height: 80vh;
            justify-content: center;
            align-items: center;
            justify-content: space-around;
            flex-wrap:wrap-reverse ;
            gap: 30px;
            row-gap:40px ;
            column-gap: 10px;

            
        }
       .item{
        height: 72px;
        width: 72px;
        border: 2px solid black;
        background-color: aqua;
        margin: 4px;
        flex-grow: 1;

       }
       .order1{
        order: 1;
    }
    .order2{
        order: 2;
    }
    .order3{
        order: 3;
    }
    .item1{
        flex-grow: 2;
        flex-shrink: 2;
        align-self: flex-end ;
    }
    .item2{

        align-self:flex-start;
    }
    </style>
</head>
<body>
    <main>
     <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        
        
     </div>
    </main>

    
</body>
</html>
