<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple color website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap');
;
    </style>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        :root{
            --primary-color:rgba(160, 87, 228, 0.858);
            --text-color: white;
            --secoundry-color:rgba(221, 208, 234, 0.858);



        }
        ul li{
            list-style-type: style none; 
           display: inline;
           padding: 23px;
           color:var(--text-color);
           font-weight: bolder;

        }   
        nav{
            background-color:var(--primary-color);
            padding: 12px 0;

        }  
        body{
            background-color: var(--secoundry-color);
        }    
        ul li a {
             color:var(--text-color);
             text-decoration: none;
            
        }
        
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
                <li><a href="">Contact info</a></li>

            </ul>
        </nav>
    </header>
    
</body>
</html>
