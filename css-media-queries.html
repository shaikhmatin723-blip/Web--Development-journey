<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Media Queries</title>
</head>
<style>
body
    {
        background-color:red;
   }
   @media only screen and (max-width:400px){
    body{
        background-color: aqua;
    }
}
    @media only screen and (orientation: landscape){
        body{
            border: 2px solid black;
        }
    }
        
    
   
   .boxes{
    display:flex;
    flex-direction: column;
   }
   .box{
    margin: 3px;
    padding: 3px;
    height: 344px;
    width: 344px;
    background-color: rgb(36, 38, 152);
    color: black;
   }
</style>
<body>
    <div>
        Hey I am Matin Shaikh 
    </div>
    <div class="boxes">
        <div class="box"></div>                
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>


    </div>
    
</body>
</html>
